<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR Code</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="container">
    <div class="dropdown">
        <button class="dropbtn" id="dropdownBtn">Выбери сеть</button>
        <div class="dropdown-content" id="dropdownContent">
            <div class="dropdown-item" data-network="solana">Solana</div>
            <div class="dropdown-item" data-network="ethereum">Ethereum</div>
            <div class="dropdown-item" data-network="polygon">Polygon</div>
        </div>
    </div>

    <div class="selected-network" id="selectedNetwork" style="display: none;">
        Выбранная сеть: <span id="networkName"></span>
    </div>

    <div id="qrcode" class="qrcode-container">
        <p>Выберите криптосеть для генерации QR-кода</p>
    </div>

    <div class="button-container">
        <button id="backBtn" class="button" type="button">Назад</button>
    </div>
</div>

<script type="module" src="typescript/QRGenerate.ts"></script>
</body>
</html>
